<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b" font-family="system-ui, sans-serif">微信公众号运营助手 · 功能架构</text>

  <!-- Center: Core Engine -->
  <rect x="300" y="100" width="200" height="70" rx="16" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="400" y="132" text-anchor="middle" font-size="15" font-weight="bold" fill="white" font-family="system-ui, sans-serif">wechat CLI</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">python bin/wechat</text>

  <!-- Left branch: Content Creation -->
  <!-- Template System -->
  <rect x="30" y="210" width="150" height="55" rx="12" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="105" y="237" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">📝 模板系统</text>
  <text x="105" y="256" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">8 套内置模板</text>

  <!-- AI Image Gen -->
  <rect x="30" y="285" width="150" height="55" rx="12" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="105" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">🎨 AI 图片生成</text>
  <text x="105" y="331" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">封面 + 插图</text>

  <!-- Material Library -->
  <rect x="30" y="360" width="150" height="55" rx="12" fill="#a78bfa" filter="url(#shadow)"/>
  <text x="105" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">📦 本地素材库</text>
  <text x="105" y="406" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">自动标签匹配</text>

  <!-- HTML Beautifier -->
  <rect x="30" y="435" width="150" height="55" rx="12" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="105" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">✨ HTML 排版</text>
  <text x="105" y="481" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">6 种主题</text>

  <!-- Right branch: WeChat API -->
  <!-- Draft Management -->
  <rect x="620" y="210" width="150" height="55" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="695" y="237" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">📋 草稿管理</text>
  <text x="695" y="256" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">创建 / 查询 / 发布</text>

  <!-- Upload -->
  <rect x="620" y="285" width="150" height="55" rx="12" fill="#06b6d4" filter="url(#shadow)"/>
  <text x="695" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">📤 素材上传</text>
  <text x="695" y="331" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">图片 → 微信素材库</text>

  <!-- Menu & User -->
  <rect x="620" y="360" width="150" height="55" rx="12" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="695" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">🎯 菜单 & 用户</text>
  <text x="695" y="406" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">管理菜单 / 粉丝</text>

  <!-- Statistics -->
  <rect x="620" y="435" width="150" height="55" rx="12" fill="#ef4444" filter="url(#shadow)"/>
  <text x="695" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui, sans-serif">📊 数据统计</text>
  <text x="695" y="481" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif">图文分析数据</text>

  <!-- Connection lines from center to left -->
  <line x1="300" y1="125" x2="180" y2="237" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="300" y1="135" x2="180" y2="312" stroke="#f093fb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="300" y1="145" x2="180" y2="387" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="300" y1="155" x2="180" y2="462" stroke="#4facfe" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Connection lines from center to right -->
  <line x1="500" y1="125" x2="620" y2="237" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="500" y1="135" x2="620" y2="312" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="500" y1="145" x2="620" y2="387" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="500" y1="155" x2="620" y2="462" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Top: AI Agent -->
  <rect x="280" y="20" width="240" height="44" rx="12" fill="#1e293b" filter="url(#shadow)"/>
  <text x="400" y="42" text-anchor="middle" font-size="12" fill="#a78bfa" font-family="system-ui, sans-serif">🤖 AI Agent 对话入口</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui, sans-serif">自然语言操作，无需记命令</text>
  <line x1="400" y1="64" x2="400" y2="100" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Config box -->
  <rect x="300" y="340" width="200" height="50" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="400" y="363" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569" font-family="system-ui, sans-serif">⚙️ 配置文件</text>
  <text x="400" y="380" text-anchor="middle" font-size="10" fill="#64748b" font-family="system-ui, sans-serif">.env · 模板 · 素材库 · 主题</text>

  <!-- Bottom note -->
  <rect x="100" y="495" width="600" height="18" rx="9" fill="#fef9c3"/>
  <text x="400" y="508" text-anchor="middle" font-size="11" fill="#a16207" font-family="system-ui, sans-serif">GitHub：https://github.com/shellaaa1/wechat-official-account-skill</text>
</svg>
